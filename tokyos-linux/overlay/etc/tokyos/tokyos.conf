# TokyOS Linux — Configuração Principal
# Gerado pelo tokyos-config no primeiro boot

# O backend (porta 3001) serve tanto a API quanto o frontend buildado
DASHBOARD_URL="http://127.0.0.1:3001"
BACKEND_PORT=3001
DEVICE_NAME="TokyOS Terminal"

# Servidor de display: auto | wayland | x11
# auto detecta o disponível (wayland primeiro, fallback x11)
DISPLAY_SERVER="auto"
